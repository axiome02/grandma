dataset: questions/v1/dataset.json

models:
  - name: gpt-4o
    provider: openai
    enabled: true

  - name: gpt-4o-mini
    provider: openai
    enabled: false

  - name: claude-3-5-sonnet-20241022
    provider: anthropic
    enabled: true

  - name: claude-3-haiku-20240307
    provider: anthropic
    enabled: false

  - name: gemini-2.0-flash
    provider: google
    enabled: true

  - name: gemini-1.5-pro
    provider: google
    enabled: false

evaluation:
  mode: human         # human | llm
  judge_model: gpt-4o # used only when mode = llm

output_dir: results/
